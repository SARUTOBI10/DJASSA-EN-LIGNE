<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DJASSA EN LIGNE - Connexion Client</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="style_boostrap/css/bootstrap.min.css">
    <style>
        .client-login-container {
            min-height: 100vh;
            background: linear-gradient(135deg, var(--secondary-color), var(--primary-color));
            padding: 2rem 0;
        }

        .client-login-card {
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            overflow: hidden;
            max-width: 500px;
            width: 100%;
            margin: 0 auto;
        }

        .client-login-header {
            background: linear-gradient(135deg, var(--secondary-color), var(--primary-color));
            color: white;
            padding: 2rem;
            text-align: center;
        }

        .client-login-header h2 {
            margin: 0;
            font-size: 1.8rem;
            font-weight: bold;
        }

        .client-login-header p {
            margin: 0.5rem 0 0 0;
            opacity: 0.9;
            font-size: 0.95rem;
        }

        .login-tabs {
            display: flex;
            background: #f8f9fa;
            border-bottom: 1px solid #dee2e6;
        }

        .tab-btn {
            flex: 1;
            padding: 1rem;
            border: none;
            background: transparent;
            font-weight: 600;
            color: #6c757d;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
        }

        .tab-btn.active {
            color: var(--primary-color);
            background: white;
        }

        .tab-btn.active::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: var(--primary-color);
        }

        .login-tab {
            display: none;
            padding: 2rem;
        }

        .login-tab.active {
            display: block;
        }

        .form-floating {
            margin-bottom: 1rem;
        }

        .form-floating label {
            color: #6c757d;
            font-weight: 500;
        }

        .btn-client-login {
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            border: none;
            padding: 0.75rem 2rem;
            font-weight: 600;
            font-size: 1rem;
            border-radius: 8px;
            width: 100%;
            transition: transform 0.2s ease;
        }

        .btn-client-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(255, 107, 53, 0.3);
        }

        .client-login-footer {
            background: #f8f9fa;
            padding: 1.5rem;
            text-align: center;
            border-top: 1px solid #dee2e6;
        }

        .client-login-footer a {
            color: var(--primary-color);
            text-decoration: none;
            font-weight: 500;
        }

        .client-login-footer a:hover {
            text-decoration: underline;
        }

        .password-strength {
            margin-top: 0.5rem;
            font-size: 0.85rem;
            display: none;
        }

        .password-strength.weak { color: #dc3545; }
        .password-strength.medium { color: #ffc107; }
        .password-strength.strong { color: #28a745; }

        .form-check {
            margin: 1rem 0;
        }

        .alert {
            padding: 0.75rem;
            border-radius: 8px;
            margin-bottom: 1rem;
            display: none;
        }

        .alert-success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .alert-error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
    </style>
</head>
<body>
    <div class="client-login-container">
        <div class="client-login-card">
            <div class="client-login-header">
                <h2>🛍️ DJASSA EN LIGNE</h2>
                <p>Espace Client - Connexion & Inscription</p>
                <button class="btn btn-outline" id="merchant-nav-btn" onclick="window.location.href='merchant-login.html'">🔑 Marchand</button>
            </div>

            <div class="login-tabs">
                <button class="tab-btn active" onclick="switchTab('signin')">🔐 Se connecter</button>
                <button class="tab-btn" onclick="switchTab('signup')">✨ S'inscrire</button>
            </div>

            <!-- SIGN IN TAB -->
            <div id="signin-tab" class="login-tab active">
                <div id="signin-alert" class="alert"></div>
                <form onsubmit="loginClient(event)">
                    <div class="form-floating">
                        <input type="text" class="form-control" id="client-pseudo" placeholder="Votre pseudo" required>
                        <label for="client-pseudo">👤 Pseudo</label>
                    </div>

                    <div class="form-floating">
                        <input type="password" class="form-control" id="client-password" placeholder="Votre mot de passe" required>
                        <label for="client-password">🔒 Mot de passe</label>
                    </div>

                    <div class="form-check">
                        <input type="checkbox" class="form-check-input" id="client-remember">
                        <label class="form-check-label" for="client-remember">
                            🔄 Se souvenir de moi
                        </label>
                    </div>

                    <button type="submit" class="btn btn-client-login">
                        🚀 Se connecter
                    </button>
                </form>

                <div style="text-align: center; margin-top: 1rem;">
                    <a href="#" onclick="showForgotPassword()" style="color: var(--primary-color); text-decoration: none; font-size: 0.9rem;">
                        Mot de passe oublié ?
                    </a>
                </div>
            </div>

            <!-- SIGN UP TAB -->
            <div id="signup-tab" class="login-tab">
                <div id="signup-alert" class="alert"></div>
                <form onsubmit="registerClient(event)">
                    <div class="row">
                        <div class="col-md-6">
                            <div class="form-floating">
                                <input type="text" class="form-control" id="reg-numero" placeholder="Votre numéro" required>
                                <label for="reg-numero">📱 Numéro</label>
                            </div>
                        </div>
                        <div class="col-md-6">
                            <div class="form-floating">
                                <input type="text" class="form-control" id="reg-prenom" placeholder="Votre prénom" required>
                                <label for="reg-prenom">👤 Prénom</label>
                            </div>
                        </div>
                    </div>

                    <div class="form-floating">
                        <input type="text" class="form-control" id="reg-quartier" placeholder="Votre quartier" required>
                        <label for="reg-quartier">🏠 Quartier</label>
                    </div>

                    <div class="form-floating">
                        <input type="email" class="form-control" id="reg-email" placeholder="votre@email.com" required>
                        <label for="reg-email">📧 E-mail</label>
                    </div>

                    <div class="form-floating">
                        <input type="text" class="form-control" id="reg-pseudo" placeholder="Votre pseudo" required>
                        <label for="reg-pseudo">🎭 Pseudo</label>
                    </div>

                    <div class="form-floating">
                        <input type="password" class="form-control" id="reg-password" placeholder="Mot de passe" required oninput="checkPasswordStrength()">
                        <label for="reg-password">🔒 Mot de passe</label>
                    </div>
                    <div id="password-strength" class="password-strength"></div>

                    <div class="form-floating">
                        <input type="password" class="form-control" id="reg-password-confirm" placeholder="Confirmer le mot de passe" required>
                        <label for="reg-password-confirm">🔄 Confirmer mot de passe</label>
                    </div>

                    <button type="submit" class="btn btn-client-login">
                        ✨ S'inscrire
                    </button>
                </form>
            </div>

            <div class="client-login-footer">
                <a href="index.html">← Retour à l'accueil</a>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
    <script>
        // Gestion des onglets
        function switchTab(tab) {
            // Masquer tous les onglets
            document.querySelectorAll('.login-tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));

            // Afficher l'onglet sélectionné
            document.getElementById(tab + '-tab').classList.add('active');
            event.target.classList.add('active');
        }

        // Vérification de la force du mot de passe
        function checkPasswordStrength() {
            const password = document.getElementById('reg-password').value;
            const strengthIndicator = document.getElementById('password-strength');

            if (password.length === 0) {
                strengthIndicator.style.display = 'none';
                return;
            }

            strengthIndicator.style.display = 'block';

            let strength = 0;
            let feedback = [];

            if (password.length >= 8) strength++;
            else feedback.push('8 caractères minimum');

            if (/[a-z]/.test(password)) strength++;
            else feedback.push('minuscule');

            if (/[A-Z]/.test(password)) strength++;
            else feedback.push('majuscule');

            if (/[0-9]/.test(password)) strength++;
            else feedback.push('chiffre');

            if (/[^A-Za-z0-9]/.test(password)) strength++;
            else feedback.push('caractère spécial');

            if (strength <= 2) {
                strengthIndicator.className = 'password-strength weak';
                strengthIndicator.textContent = 'Faible: ' + feedback.join(', ');
            } else if (strength <= 4) {
                strengthIndicator.className = 'password-strength medium';
                strengthIndicator.textContent = 'Moyen: Ajoutez ' + feedback.slice(0, 2).join(', ');
            } else {
                strengthIndicator.className = 'password-strength strong';
                strengthIndicator.textContent = 'Fort ✓';
            }
        }

        // Fonction mot de passe oublié
        function showForgotPassword() {
            const pseudo = document.getElementById('client-pseudo').value;
            if (!pseudo) {
                showAlert('Veuillez saisir votre pseudo d\'abord', 'error', 'signin');
                return;
            }

            showAlert('📧 Un email de réinitialisation a été envoyé à votre adresse email', 'success', 'signin');
            console.log('🔑 Demande de réinitialisation pour pseudo:', pseudo);
        }

        // Fonction d'alerte améliorée
        function showAlert(message, type, tab = 'signin') {
            const alertDiv = document.getElementById(tab + '-alert');
            alertDiv.textContent = message;
            alertDiv.className = 'alert alert-' + type;
            alertDiv.style.display = 'block';

            setTimeout(() => {
                alertDiv.style.display = 'none';
            }, 5000);
        }

        // Pré-remplir les champs si credentials sauvegardés
        loadSavedCredentials();
        const savedClient = localStorage.getItem('djassa_client_credentials');
        if (savedClient) {
            const credentials = JSON.parse(savedClient);
            document.getElementById('client-pseudo').value = credentials.pseudo || '';
            document.getElementById('client-remember').checked = true;
        }
    </script>
</body>
</html>
