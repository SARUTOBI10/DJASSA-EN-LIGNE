<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Système de Commandes</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .test-section {
            background: #f8f9fa;
            padding: 1rem;
            margin: 1rem 0;
            border-radius: 5px;
        }
        .test-result {
            padding: 0.5rem;
            margin: 0.5rem 0;
            border-radius: 4px;
        }
        .success { background: #d4edda; color: #155724; }
        .error { background: #f8d7da; color: #721c24; }
        .info { background: #d1ecf1; color: #0c5460; }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="container">
            <div class="navbar-brand">DJASSA EN LIGNE - TEST COMMANDES</div>
            <div class="nav-buttons">
                <button class="btn btn-outline" id="orders-btn">📦 Mes Commandes</button>
            </div>
        </div>
    </nav>

    <div class="container" style="padding: 2rem;">
        <h1>🧪 Test du Système de Commandes</h1>

        <div class="test-section">
            <h3>1. Créer une commande de test</h3>
            <button onclick="createTestOrder()" class="btn">Créer Commande Test</button>
            <div id="create-result"></div>
        </div>

        <div class="test-section">
            <h3>2. Vérifier les commandes existantes</h3>
            <button onclick="checkOrders()" class="btn">Voir Toutes les Commandes</button>
            <div id="orders-result"></div>
        </div>

        <div class="test-section">
            <h3>3. Tester l'accès client</h3>
            <button onclick="testClientAccess()" class="btn">Tester Accès Client</button>
            <div id="client-result"></div>
        </div>

        <div class="test-section">
            <h3>4. Simuler validation marchand</h3>
            <button onclick="simulateApproval()" class="btn">Valider Commande</button>
            <div id="approval-result"></div>
        </div>
    </div>

    <script src="script.js"></script>
    <script>
        // Simuler des données pour le test
        if (!localStorage.getItem('djassa_orders')) {
            localStorage.setItem('djassa_orders', JSON.stringify([]));
        }

        function createTestOrder() {
            const result = document.getElementById('create-result');

            // Créer une commande de test
            const testOrder = {
                id: 'TEST-' + Date.now(),
                date: new Date().toLocaleDateString('fr-FR'),
                items: [
                    { id: 1, name: 'Test Product', price: 10000, quantity: 1, emoji: '🧪' }
                ],
                total: 10000,
                clientName: 'Test Client',
                clientEmail: 'test@example.com',
                clientAddress: '123 Test Street',
                clientPhone: '0123456789',
                status: 'pending'
            };

            // Ajouter à la liste des commandes
            orders.push(testOrder);
            saveData();

            result.innerHTML = `
                <div class="test-result success">
                    ✓ Commande de test créée: ${testOrder.id}<br>
                    Email: ${testOrder.clientEmail}<br>
                    Statut: ${testOrder.status}
                </div>
            `;
        }

        function checkOrders() {
            const result = document.getElementById('orders-result');
            loadData();

            if (orders.length === 0) {
                result.innerHTML = '<div class="test-result info">Aucune commande trouvée</div>';
                return;
            }

            let html = '<div class="test-result info">Commandes trouvées:</div>';
            orders.forEach(order => {
                html += `
                    <div class="test-result info" style="margin-top: 0.5rem;">
                        ${order.id} - ${order.clientEmail} - Statut: ${order.status}
                    </div>
                `;
            });
            result.innerHTML = html;
        }

        function testClientAccess() {
            const result = document.getElementById('client-result');

            // Simuler l'accès client
            const email = 'test@example.com';
            const clientOrders = orders.filter(o => o.clientEmail === email);

            if (clientOrders.length === 0) {
                result.innerHTML = '<div class="test-result error">❌ Aucune commande trouvée pour test@example.com</div>';
                return;
            }

            result.innerHTML = `
                <div class="test-result success">
                    ✓ ${clientOrders.length} commande(s) trouvée(s) pour ${email}
                </div>
                <button onclick="showClientOrders('${email}')" class="btn" style="margin-top: 0.5rem;">Voir Commandes</button>
            `;
        }

        function simulateApproval() {
            const result = document.getElementById('approval-result');
            loadData();

            const pendingOrder = orders.find(o => o.status === 'pending');
            if (!pendingOrder) {
                result.innerHTML = '<div class="test-result error">❌ Aucune commande en attente trouvée</div>';
                return;
            }

            // Simuler l'approbation
            approveOrder(pendingOrder.id);
            result.innerHTML = `
                <div class="test-result success">
                    ✓ Commande ${pendingOrder.id} approuvée<br>
                    Notification envoyée à ${pendingOrder.clientEmail}
                </div>
            `;
        }

        // Initialiser le bouton Mes Commandes
        document.getElementById('orders-btn').onclick = () => showClientOrdersModal();
    </script>
</body>
</html>
